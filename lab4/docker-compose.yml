services:
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "5001:5001"

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5002:5002"
    environment:
      PRODUCT_SERVICE_URL: http://product-service:5001
    depends_on:
      - product-service
      - payment-service
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "5003:5003"